name: Build

on:
  push:
    branches:
      - master

jobs:
  Android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - name: Check out git repository
        uses: actions/checkout@v4

      - name: Setup Env
        uses: ./.github/actions/setup

      - name: Install npm dependencies
        run: npm ci

      - name: Build Packages
        env:
          DISABLE_SVG: 1
        shell: bash
        run: |
          cd android
          # Check if required secrets are available
          if [ -z "${{ secrets.KEYSTORE_STORE_FILE_BASE64 }}" ] || [ -z "${{ secrets.KEYSTORE_KEY_ALIAS }}" ] || [ -z "${{ secrets.KEYSTORE_PASSWORD }}" ] || [ -z "${{ secrets.KEYSTORE_KEY_PASSWORD }}" ]; then
            echo "Warning: Required signing secrets not found. Building debug APK instead of release."
            echo "This is expected for forks or repositories without signing secrets configured."
            ./gradlew assembleDebug
          else
            echo "Building release APK with provided signing secrets."
            echo "${{ secrets.KEYSTORE_STORE_FILE_BASE64 }}" | base64 --decode > app/app.keystore
            ./gradlew assembleRelease -PMYAPP_UPLOAD_STORE_FILE='app.keystore' -PMYAPP_UPLOAD_KEY_ALIAS='${{ secrets.KEYSTORE_KEY_ALIAS }}' -PMYAPP_UPLOAD_STORE_PASSWORD='${{ secrets.KEYSTORE_PASSWORD }}' -PMYAPP_UPLOAD_KEY_PASSWORD='${{ secrets.KEYSTORE_KEY_PASSWORD }}'
            rm -f app/app.keystore
          fi

      # Push tag to GitHub if package.json version's tag is not tagged
      - name: Get package version
        run: |
          Package_Version=$(node -p "require('./package.json').version")
          echo "PACKAGE_VERSION=$Package_Version" >> $GITHUB_ENV

      - name: Generate file MD5
        run: |
          cd android/app/build/outputs/apk/release
          md5sum *.apk

      - name: Upload Artifact
        uses: ./.github/actions/upload-artifact
        env:
          Package_Version: ${{ env.PACKAGE_VERSION }}
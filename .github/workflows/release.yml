name: Build & Release

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  Build_Android:
    name: Build Android (${{ matrix.arch }})
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      matrix:
        arch: [arm64-v8a, armeabi-v7a]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build APK
        env:
          DISABLE_SVG: 1
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -PreactNativeArchitectures=${{ matrix.arch }} \
            -PMYAPP_UPLOAD_STORE_FILE=debug.keystore \
            -PMYAPP_UPLOAD_KEY_ALIAS=androiddebugkey \
            -PMYAPP_UPLOAD_STORE_PASSWORD=android \
            -PMYAPP_UPLOAD_KEY_PASSWORD=android

      - name: Rename APK
        run: |
          VERSION=$(node -p "require(\"./package.json\").version")
          ARCH="${{ matrix.arch }}"
          SAFE_ARCH=$(echo $ARCH | tr '-' '_')
          APK_FILE=$(ls android/app/build/outputs/apk/release/app-*${SAFE_ARCH}*.apk 2>/dev/null || ls android/app/build/outputs/apk/release/app-*v7a*.apk 2>/dev/null || ls android/app/build/outputs/apk/release/app-*.apk 2>/dev/null | head -1)
          if [ -n "$APK_FILE" ]; then
            mv "$APK_FILE" "android/app/build/outputs/apk/release/lx-music-mobile-v${VERSION}-${ARCH}.apk"
          fi
          ls -la android/app/build/outputs/apk/release/

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.arch }}
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: matrix.arch == 'arm64-v8a'
        with:
          tag_name: v$(node -p "require(\"./package.json\").version")
          name: Release v$(node -p "require(\"./package.json\").version")
          generate_release_notes: true
          files: |
            android/app/build/outputs/apk/release/lx-music-mobile-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

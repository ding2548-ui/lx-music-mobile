name: Build & Release

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  Build_Android:
    name: Build Android (${{ matrix.arch }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        arch: [arm64-v8a, armeabi-v7a]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Generate debug keystore
        run: |
          mkdir -p android/app
          cd android/app
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -storepass android -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build APK
        env:
          DISABLE_SVG: 1
        run: |
          cd android
          ./gradlew assembleRelease \
            -PreactNativeArchitectures=${{ matrix.arch }} \
            -PMYAPP_UPLOAD_STORE_FILE=debug.keystore \
            -PMYAPP_UPLOAD_KEY_ALIAS=androiddebugkey \
            -PMYAPP_UPLOAD_STORE_PASSWORD=android \
            -PMYAPP_UPLOAD_KEY_PASSWORD=android

      - name: Rename APK
        run: |
          VERSION=$(node -p "require('./package.json').version")
          ARCH="${{ matrix.arch }}"
          mv android/app/build/outputs/apk/release/app-arm64-v8a-release.apk android/app/build/outputs/apk/release/lx-music-$VERSION-$ARCH.apk 2>/dev/null || \
          mv android/app/build/outputs/apk/release/app-armeabi-v7a-release.apk android/app/build/outputs/apk/release/lx-music-$VERSION-$ARCH.apk 2>/dev/null || \
          cp android/app/build/outputs/apk/release/*.apk android/app/build/outputs/apk/release/lx-music-$VERSION-$ARCH.apk

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: matrix.arch == 'arm64-v8a'
        with:
          tag_name: v$(node -p "require('./package.json').version")
          name: v$(node -p "require('./package.json').version")
          generate_release_notes: true
          files: android/app/build/outputs/apk/release/lx-music-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

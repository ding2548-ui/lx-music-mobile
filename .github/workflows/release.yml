name: Build

on:
  push:
    branches:
      - master

jobs:
  Android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - name: Check out git repository
        uses: actions/checkout@v4

      - name: Setup Env
        uses: ./.github/actions/setup

      - name: Create debug keystore
        run: cd android && keytool -genkeypair -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

      - name: Build V7a APK with JS bundle
        env:
          DISABLE_SVG: 1
          ARCH: armeabi-v7a
        run: |
          cd android
          ./gradlew assembleDebug \
            -PreactNativeArchitectures=$ARCH \
            -PbundleInDebug=true

      - name: Get package version
        run: echo "PACKAGE_VERSION=$(node -p \"require('./package.json').version\")" >> $GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lx-music-${{ env.PACKAGE_VERSION }}-v7a
          path: android/app/build/outputs/apk/debug/*armeabi*.apk
          retention-days: 30
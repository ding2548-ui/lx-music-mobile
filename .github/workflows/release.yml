name: Build & Release

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  Build_Android:
    name: Build Android (${{ matrix.arch }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      matrix:
        arch: [arm64-v8a, armeabi-v7a]
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate debug keystore
        run: |
          keytool -genkey -v \
            -keystore android/app/debug.keystore \
            -alias androiddebugkey \
            -storepass android \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug, O=Android, C=US"

      - name: Build APK
        env:
          DISABLE_SVG: 1
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -PreactNativeArchitectures=${{ matrix.arch }} \
            -PMYAPP_UPLOAD_STORE_FILE=debug.keystore \
            -PMYAPP_UPLOAD_KEY_ALIAS=androiddebugkey \
            -PMYAPP_UPLOAD_STORE_PASSWORD=android \
            -PMYAPP_UPLOAD_KEY_PASSWORD=android

      - name: Find and rename APK
        run: |
          VERSION=$(node -p "require('./package.json').version")
          ARCH="${{ matrix.arch }}"
          OUTDIR="android/app/build/outputs/apk/release"
          echo "Searching for APK in $OUTDIR..."
          ls -la "$OUTDIR" || echo "Directory not found"
          find "$OUTDIR" -name "*.apk" -type f
          # Copy the first APK found to a known name
          APK_FILE=$(find "$OUTDIR" -name "*.apk" -type f | head -1)
          if [ -n "$APK_FILE" ]; then
            APK_NAME="lx-music-${VERSION}-${ARCH}.apk"
            cp "$APK_FILE" "$OUTDIR/$APK_NAME"
            echo "Renamed to: $APK_NAME"
            ls -la "$OUTDIR/$APK_NAME"
          else
            echo "No APK found!"
            exit 1
          fi

      - name: Upload to Release
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v$(node -p "require('./package.json').version")-${{ matrix.arch }}
          name: v$(node -p "require('./package.json').version") (${{ matrix.arch }})
          generate_release_notes: true
          files: android/app/build/outputs/apk/release/lx-music-*.apk
          make_latest: legacy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
